<!doctype html>
<html lang="he">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>RingCal</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4285f4" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RingCal" />
    <link rel="apple-touch-icon" href="/logo192.png" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Fix Android IME backspace (deleteSurroundingText) not triggering React onChange
      if (/Android/i.test(navigator.userAgent)) {
        var inputProto = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value')
        var taProto = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value')
        document.addEventListener('input', function(e) {
          var target = e.target
          if (!target || (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA')) return
          var proto = target.tagName === 'INPUT' ? inputProto : taProto
          if (proto && proto.set) {
            proto.set.call(target, target.value)
            target.dispatchEvent(new Event('input', { bubbles: true }))
          }
        }, true)
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
