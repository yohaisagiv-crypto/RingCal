<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RingCal Icon Generator</title>
  <style>
    body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; gap: 24px; }
    canvas { border-radius: 112px; box-shadow: 0 8px 48px rgba(0,0,0,0.6); }
    .btn { padding: 14px 36px; background: #4285f4; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; letter-spacing: 0.5px; }
    .btn:hover { background: #2563d4; }
    p { color: #aaa; font-size: 13px; margin: 0; }
  </style>
</head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<button class="btn" onclick="download()">⬇ הורד PNG 512×512</button>
<p>פתח בכרום ולחץ הורד</p>

<script>
const c = document.getElementById('c')
const ctx = c.getContext('2d')
const W = 512, CX = W/2, CY = W/2

function hex(h) {
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16)
  return [r,g,b]
}

function arc(ra, rb, a1, a2, color, alpha=1) {
  ctx.save()
  ctx.beginPath()
  ctx.arc(CX, CY, rb, a1, a2)
  ctx.arc(CX, CY, ra, a2, a1, true)
  ctx.closePath()
  const [r,g,b] = hex(color)
  ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`
  ctx.fill()
  ctx.restore()
}

function ring(ra, rb, col) {
  ctx.beginPath()
  ctx.arc(CX, CY, rb, 0, Math.PI*2)
  ctx.arc(CX, CY, ra, 0, Math.PI*2, true)
  ctx.closePath()
  const [r,g,b] = hex(col)
  ctx.fillStyle = `rgba(${r},${g},${b},0.28)`
  ctx.fill()
}

function spoke(a, r1, r2, lw, col) {
  const x1 = CX + Math.cos(a)*r1, y1 = CY + Math.sin(a)*r1
  const x2 = CX + Math.cos(a)*r2, y2 = CY + Math.sin(a)*r2
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2)
  ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.stroke()
}

// ── Background ──
const bg = ctx.createRadialGradient(CX, CY-40, 40, CX, CY, 280)
bg.addColorStop(0, '#22285a')
bg.addColorStop(1, '#0d0f2a')
ctx.fillStyle = bg
ctx.beginPath()
ctx.roundRect(0, 0, W, W, 112)
ctx.fill()

// ── Outer glow ──
const glow = ctx.createRadialGradient(CX, CY, 160, CX, CY, 260)
glow.addColorStop(0, 'rgba(66,133,244,0.10)')
glow.addColorStop(1, 'rgba(66,133,244,0)')
ctx.fillStyle = glow
ctx.beginPath(); ctx.arc(CX, CY, 260, 0, Math.PI*2); ctx.fill()

// ── Rings (4 category rings) ──
const R_IN = 68, R_OUT = 240
const RING_W = (R_OUT - R_IN) / 4
const cats = [
  { color: '#27ae60' }, // personal (innermost)
  { color: '#e74c3c' }, // holiday
  { color: '#8e44ad' }, // study
  { color: '#4285f4' }, // work (outermost)
]
cats.forEach((cat, i) => {
  const ra = R_IN + i * RING_W
  const rb = ra + RING_W
  ring(ra, rb, cat.color)
})

// ── Month spokes (12) ──
ctx.globalAlpha = 0.5
for (let m = 0; m < 12; m++) {
  const a = -Math.PI/2 + (m/12)*Math.PI*2
  spoke(a, R_IN, R_OUT, m%3===0?2:0.8, m%3===0?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.3)')
}
ctx.globalAlpha = 1

// ── Ring outlines ──
cats.forEach((cat, i) => {
  const r = R_IN + (i+1)*RING_W
  ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2)
  ctx.strokeStyle = cat.color+'99'; ctx.lineWidth=1.5; ctx.stroke()
})
ctx.beginPath(); ctx.arc(CX,CY,R_IN,0,Math.PI*2)
ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=2.5; ctx.stroke()
ctx.beginPath(); ctx.arc(CX,CY,R_OUT,0,Math.PI*2)
ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=3; ctx.stroke()

// ── Elapsed arc (about 40% of year) — blue work ring ──
const eA = -Math.PI/2, eB = eA + 0.42*Math.PI*2
const WORK_RA = R_IN + 3*RING_W, WORK_RB = R_OUT
arc(WORK_RA, WORK_RB, eA, eB, '#4285f4', 0.25)

// ── Critical arc (red) — about 10% from now ──
const cA = -Math.PI/2 + 0.42*Math.PI*2
const cB = cA + 0.10*Math.PI*2
ctx.save()
ctx.beginPath()
ctx.arc(CX,CY,R_OUT,cA,cB); ctx.arc(CX,CY,R_IN,cB,cA,true); ctx.closePath()
ctx.fillStyle='rgba(231,76,60,0.35)'; ctx.fill()
ctx.beginPath(); ctx.arc(CX,CY,R_OUT,cA,cB)
ctx.strokeStyle='rgba(231,76,60,1)'; ctx.lineWidth=4; ctx.stroke()
ctx.restore()

// ── A few sample events (arc bands) ──
const evs = [
  { a1: 0.15, a2: 0.22, ring: 3, col: '#4285f4' },
  { a1: 0.55, a2: 0.60, ring: 2, col: '#8e44ad' },
  { a1: 0.72, a2: 0.76, ring: 1, col: '#e74c3c' },
  { a1: 0.88, a2: 0.95, ring: 3, col: '#4285f4' },
]
evs.forEach(ev => {
  const ra = R_IN + ev.ring * RING_W + 2
  const rb = R_IN + (ev.ring+1) * RING_W - 2
  const a1 = -Math.PI/2 + ev.a1*Math.PI*2
  const a2 = -Math.PI/2 + ev.a2*Math.PI*2
  const [r,g,b] = hex(ev.col)
  ctx.save()
  ctx.beginPath(); ctx.arc(CX,CY,rb,a1,a2); ctx.arc(CX,CY,ra,a2,a1,true); ctx.closePath()
  ctx.fillStyle=`rgba(${r},${g},${b},0.45)`; ctx.fill()
  ctx.strokeStyle=ev.col; ctx.lineWidth=2.5; ctx.stroke()
  ctx.restore()
})

// ── Needle ──
const needleA = -Math.PI/2 + 0.52*Math.PI*2
const nx1 = CX + Math.cos(needleA)*R_IN*0.4
const ny1 = CY + Math.sin(needleA)*R_IN*0.4
const nx2 = CX + Math.cos(needleA)*(R_OUT+4)
const ny2 = CY + Math.sin(needleA)*(R_OUT+4)
ctx.beginPath(); ctx.moveTo(nx1,ny1); ctx.lineTo(nx2,ny2)
ctx.strokeStyle='#e74c3c'; ctx.lineWidth=3.5; ctx.lineCap='round'; ctx.stroke()
ctx.beginPath(); ctx.arc(nx2,ny2,7,0,Math.PI*2); ctx.fillStyle='#e74c3c'; ctx.fill()

// ── Clock face (center) ──
const CR = R_IN * 0.86
ctx.save()
const cf = ctx.createRadialGradient(CX,CY-8,4,CX,CY,CR)
cf.addColorStop(0,'#ffffff'); cf.addColorStop(1,'#e8eeff')
ctx.beginPath(); ctx.arc(CX,CY,CR,0,Math.PI*2); ctx.fillStyle=cf; ctx.fill()
ctx.strokeStyle='rgba(60,80,160,0.25)'; ctx.lineWidth=2; ctx.stroke()
ctx.restore()

// Clock tick marks
for(let i=0;i<12;i++){
  const a=-Math.PI/2+(i/12)*Math.PI*2
  const isMaj=i%3===0
  const r1=CR*(isMaj?0.72:0.80), r2=CR*0.90
  spoke(a,r1,r2,isMaj?2.5:1,'rgba(30,40,120,0.6)')
}

// Clock hands (showing ~10:10)
function hand(frac,len,lw,col){
  const a=-Math.PI/2+frac*Math.PI*2
  ctx.beginPath(); ctx.moveTo(CX,CY)
  ctx.lineTo(CX+Math.cos(a)*len,CY+Math.sin(a)*len)
  ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.stroke()
}
hand(10.17/12, CR*0.52, 4.5, '#1a1a3e')   // hour
hand(2/60,     CR*0.70, 3.0, '#1a1a3e')   // minute (10 min)
hand(0.5/60,   CR*0.78, 1.8, '#e74c3c')   // second

ctx.beginPath(); ctx.arc(CX,CY,5,0,Math.PI*2); ctx.fillStyle='#e74c3c'; ctx.fill()
ctx.beginPath(); ctx.arc(CX,CY,2.5,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill()

// ── "RC" text watermark at bottom ──
ctx.save()
ctx.font = 'bold 22px Arial'
ctx.fillStyle = 'rgba(255,255,255,0.18)'
ctx.textAlign = 'center'
ctx.fillText('RINGCAL', CX, W - 28)
ctx.restore()

// ── Download ──
function download() {
  const a = document.createElement('a')
  a.download = 'ringcal-icon-512.png'
  a.href = c.toDataURL('image/png')
  a.click()
}
</script>
</body>
</html>
